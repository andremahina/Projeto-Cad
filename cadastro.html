<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sistema de cadastro e Listagem</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="cadastro.css">
    </head>
    <body>
        <header>
            <div class="logo">
                <span>CAD</span>cadastra-me!
            </div>
            <div class="links">
                <a href="#">Cadastrar</a>|
                <a href="#">Listar usuarios</a>
            </div>
        </header>
        <section>
            <div class="container">
                    <span>CAD</span>
                <article>
                    <h1>Formulario de cadastro</h1>
                    <form action="">
                        <div class="form-group">
                            <input type="text" name="nome" id="nome" required>
                            <label for="nome">Nome completo</label>
                        </div>
                        <div class="corte">
                            <div class="form-group" id="corte1">
                                <input type="email" name="email" id="email" required>
                                <label for="email">E-mail</label>
                            </div>
                            <div class="form-group" id="corte2">
                                <input type="number" name="idade" id="idade" required>
                                <label for="idade">Idade</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <input type="password" name="senha" id="senha" required>
                            <label for="senha">Senha</label>
                        </div>
                        <div class="form-group">
                            <input type="password" name="confirmar" id="confirmar" required>
                            <label for="confirmar">Confirmar</label>
                        </div>
                        <button type="submit">Cadastrar</button>
                        <div class="login-link">Já tem uma conta?<a href="#">Login</a></div>
                        </div>
                    <article></article>
        </section>
        <footer>
            <div class="footer-links">
                <a href="#">Facebook</a>|   
                <a href="#">Instagram</a>|
                <a href="#">X</a>|
                <a href="#">Whatsapp</a>|
                <a href="#">Telegram</a>
            </div>
            <p>Todos os direitos reservados a Rendu &copysr;</p>
            <p>Site desenvolvido pela Zuray</p>
        </footer>
    </body>
</html>
